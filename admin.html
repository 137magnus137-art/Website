<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Mythic Creations</title>
  <link rel="stylesheet" href="/site/assets/mc-site.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.10), transparent 50%),
        linear-gradient(180deg, #0c0a14 0%, #1b0f26 60%, #050309 100%);
      color: #ece6d4;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }
    .admin-page {
      max-width: 980px;
      margin: 0 auto;
      padding: calc(var(--mc-nav-h) + 64px) 28px 80px;
      position: relative;
      z-index: 5;
    }
    .admin-page h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      letter-spacing: 4px;
      color: #f4d987;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .admin-page .eyebrow {
      font-size: 0.74rem; letter-spacing: 4px; color: #b29657;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .admin-page p.lede {
      color: rgba(236,230,212,0.74);
      max-width: 640px;
      font-size: 0.96rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .card {
      padding: 28px 30px;
      border-radius: 14px;
      background: rgba(8,8,8,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,168,76,0.22);
      margin-bottom: 24px;
    }
    .card h2 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 3px;
      color: #f4d987;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > label { flex: 1; min-width: 220px; }

    label { display: block; margin-bottom: 14px; }
    label > span { font-size: 0.74rem; letter-spacing: 2px; color: #d4af72; text-transform: uppercase; display: block; margin-bottom: 6px; }
    input[type=text], input[type=password], input[type=email], textarea, select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.30);
      border-radius: 9px;
      color: #ece6d4;
      font-family: 'Inter', sans-serif;
      font-size: 0.94rem;
      outline: none;
      transition: border .2s, box-shadow .25s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #f4d987;
      box-shadow: 0 0 18px rgba(240,208,97,0.18);
    }
    textarea { resize: vertical; min-height: 130px; }
  </style>
</head>
<body>

<div id="mc-nav-mount"></div>

<div class="admin-page">
  <div class="eyebrow">Admin Portal</div>
  <h1>Control Panel</h1>
  <p class="lede">Manage site content and settings here.</p>

  <div class="card">
    <h2>Coming Soon</h2>
    <p>Admin features are being developed.</p>
  </div>
</div>

<script src="/site/assets/mc-nav.js"></script>
</body>
</html>
