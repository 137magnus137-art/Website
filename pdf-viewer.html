<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF — Mythic Creations</title>
  <link rel="stylesheet" href="/site/assets/mc-site.css">
  <style>
    body {
      margin: 0;
      background: #000;
      color: var(--mc-gold);
      height: 100vh;
      overflow: hidden;
    }
    .pdf-shell {
      position: fixed;
      top: var(--mc-nav-h);
      left: 0; right: 0; bottom: 0;
      background: #1a1a1e;
    }
    .pdf-shell iframe {
      width: 100%; height: 100%;
      border: 0;
      background: #1a1a1e;
    }
    .pdf-toolbar {
      position: fixed;
      top: calc(var(--mc-nav-h) + 12px);
      right: 18px;
      z-index: 50;
      display: flex;
      gap: 8px;
    }
    .pdf-toolbar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px);
      border: 1px solid var(--mc-gold-soft);
      color: var(--mc-gold);
      text-decoration: none;
      font-family: Georgia, serif;
      font-size: 0.74rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }
    .pdf-toolbar a:hover {
      border-color: var(--mc-gold);
      box-shadow: 0 0 16px rgba(201,168,76,0.25);
      color: #f4d987;
    }
    .pdf-missing {
      position: fixed;
      inset: var(--mc-nav-h) 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      color: var(--mc-gold);
      font-family: Georgia, serif;
    }
    .pdf-missing h1 { font-size: 2rem; letter-spacing: 2px; margin-bottom: 10px; }
    .pdf-missing p  { color: var(--mc-gold-dim); font-size: 0.95rem; }
  </style>
</head>
<body data-page="pdf-viewer">

<div id="mc-nav-mount"></div>

<div class="pdf-shell" data-testid="pdf-shell">
  <iframe id="pdfFrame" title="PDF viewer" data-testid="pdf-frame"></iframe>
</div>

<div class="pdf-toolbar">
  <a id="openExternal" href="#" target="_blank" rel="noopener" data-testid="pdf-open-tab">Open in new tab &#x21AA;</a>
  <a id="downloadLink" href="#" download data-testid="pdf-download">Download</a>
</div>

<div class="pdf-missing" id="pdfMissing" style="display:none" data-testid="pdf-missing">
  <h1>No PDF specified</h1>
  <p>Pass a <code>?src=&lt;path&gt;</code> query</p>
</div>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const src = params.get('src');
  const title = params.get('title');

  if (!src) {
    document.getElementById('pdfMissing').style.display = 'flex';
    document.querySelector('.pdf-shell').style.display = 'none';
    document.querySelector('.pdf-toolbar').style.display = 'none';
    return;
  }
  document.getElementById('pdfFrame').src = src + '#toolbar=1&navpanes=0';
  document.getElementById('openExternal').href = src;
  document.getElementById('downloadLink').href = src;
  if (title) document.title = decodeURIComponent(title) + ' — Mythic Creations';
})();
</script>

<script src="/site/assets/mc-nav.js"></script>
</body>
</html>
